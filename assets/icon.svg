<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D5EF6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="tile" x1="180" y1="180" x2="844" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#312E81" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App-icon background (squircle-ish rounded rect) -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- 2x2 mosaic; upper-left + lower-right filled = the ▚ menu-bar glyph as tiles -->
  <g filter="url(#shadow)">
    <rect x="180" y="180" width="312" height="312" rx="52" fill="url(#tile)"/>
    <rect x="532" y="532" width="312" height="312" rx="52" fill="url(#tile)"/>
  </g>
  <rect x="532" y="180" width="312" height="312" rx="52" fill="#FFFFFF" fill-opacity="0.26"/>
  <rect x="180" y="532" width="312" height="312" rx="52" fill="#FFFFFF" fill-opacity="0.26"/>
</svg>
